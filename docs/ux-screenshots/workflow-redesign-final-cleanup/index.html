<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Workflow Redesign Final Cleanup Screenshots</title>
    <style>
      body {
        margin: 0;
        background: #f1f5f9;
        color: #0f172a;
        font-family: Arial, sans-serif;
      }

      main {
        max-width: 1180px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0 0 24px;
        color: #475569;
      }

      section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
      }

      figure {
        margin: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: white;
        overflow: hidden;
      }

      figcaption {
        padding: 12px;
        font-weight: 700;
      }

      img {
        display: block;
        width: 100%;
        height: auto;
        border-top: 1px solid #e2e8f0;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Workflow Redesign Final Cleanup Screenshots</h1>
      <p>Targeted pre-commit visual QA captures after mobile bottom-nav and phone-gating cleanup.</p>
      <section>
        <figure>
          <figcaption>390px tentative add-on confirmation</figcaption>
          <img src="mobile-390__tentative-addon-confirmation.png" alt="390px tentative add-on confirmation" />
        </figure>
        <figure>
          <figcaption>390px facility detail possible add-on</figcaption>
          <img src="mobile-390__facility-detail-possible-addon.png" alt="390px facility detail possible add-on" />
        </figure>
        <figure>
          <figcaption>390px facility detail add-to-route action</figcaption>
          <img src="mobile-390__facility-detail-add-route-action.png" alt="390px facility detail add-to-route action" />
        </figure>
        <figure>
          <figcaption>390px location confirmation action</figcaption>
          <img src="mobile-390__location-confirmation-action.png" alt="390px location confirmation action" />
        </figure>
        <figure>
          <figcaption>390px import confirm-route action</figcaption>
          <img src="mobile-390__import-confirm-route-action.png" alt="390px import confirm-route action" />
        </figure>
        <figure>
          <figcaption>390px outreach queue</figcaption>
          <img src="mobile-390__outreach-queue.png" alt="390px outreach queue" />
        </figure>
        <figure>
          <figcaption>390px outreach blocked text action</figcaption>
          <img src="mobile-390__outreach-blocked-text-action.png" alt="390px outreach blocked text action" />
        </figure>
        <figure>
          <figcaption>390px import review</figcaption>
          <img src="mobile-390__import-review.png" alt="390px import review" />
        </figure>
        <figure>
          <figcaption>768px route best add-on</figcaption>
          <img src="tablet-768__route-best-addon.png" alt="768px route best add-on" />
        </figure>
        <figure>
          <figcaption>1440px route best add-on</figcaption>
          <img src="desktop-1440__route-best-addon.png" alt="1440px route best add-on" />
        </figure>
      </section>
    </main>
  </body>
</html>
